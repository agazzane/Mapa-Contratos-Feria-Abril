<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mapa de Contratos – Feria Abril 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --firmado:   #22c55e; --firmado-t:   #14532d;
    --pendiente: #facc15; --pend-t:      #713f12;
    --bg:        #f0f4f8; --font:        'DM Sans', system-ui, sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); min-height: 100vh; color: #1e293b; }

  header { background: #1e293b; color: white; padding: 8px 12px 6px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
  header p  { font-size: 12px; opacity: .65; margin-top: 1px; }

  .stats { display: flex; gap: 8px; padding: 10px 14px; background: #1e293b; border-top: 1px solid rgba(255,255,255,.1); overflow-x: auto; scrollbar-width: none; }
  .stats::-webkit-scrollbar { display: none; }
  .stat-pill { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.1); border-radius: 20px; padding: 5px 12px; white-space: nowrap; font-size: 12px; color: white; }
  .stat-pill .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .stat-pill strong { font-weight: 700; margin-left: 2px; }

  .tabs { display: flex; background: white; border-bottom: 2px solid #e2e8f0; position: sticky; top: 70px; z-index: 90; }
  .tab-btn { flex: 1; padding: 12px 8px; font-size: 14px; font-weight: 600; font-family: var(--font); border: none; background: none; cursor: pointer; color: #64748b; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .tab-btn.active { color: #1e293b; border-bottom-color: #1e293b; }

  .filters { padding: 6px 10px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; background: white; border-bottom: 1px solid #e2e8f0; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 2px solid #e2e8f0; font-size: 13px; font-weight: 600; font-family: var(--font); cursor: pointer; white-space: nowrap; background: white; color: #64748b; transition: all .15s; }
  .filter-btn.active { border-color: #1e293b; color: #1e293b; background: #f8fafc; }
  .filter-btn[data-f="FIRMADO"].active   { border-color: var(--firmado);   color: var(--firmado-t);   background: #f0fdf4; }
  .filter-btn[data-f="PENDIENTE"].active { border-color: #ca8a04;          color: var(--pend-t);      background: #fefce8; }

  .search-wrap { padding: 6px 10px; background: white; border-bottom: 1px solid #e2e8f0; }
  .search-wrap input { width: 100%; padding: 9px 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; font-family: var(--font); outline: none; transition: border-color .2s; }
  .search-wrap input:focus { border-color: #94a3b8; }

  .floor { display: none; }
  .floor.active { display: block; }

  .zoom-controls { position: fixed; bottom: 24px; right: 16px; z-index: 150; display: flex; flex-direction: column; gap: 6px; }
  .zoom-btn { width: 44px; height: 44px; border-radius: 50%; background: #1e293b; color: white; border: none; font-size: 22px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,.35); font-family: var(--font); user-select: none; -webkit-tap-highlight-color: transparent; }
  .zoom-btn:active { transform: scale(.92); }
  .zoom-level { text-align: center; font-size: 11px; color: #64748b; font-weight: 600; }

  .map-scroll { overflow: auto; padding: 6px; -webkit-overflow-scrolling: touch; }
  .map-inner { transform-origin: top left; width: max-content; transition: transform 0.15s ease; position: relative; }
  .map-bg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; }
  .grid { display: grid; gap: 2px; grid-auto-rows: 30px; position: relative; z-index: 1; }

  .stand { border-radius: 7px; padding: 3px; cursor: pointer; transition: transform .15s, box-shadow .15s; border: 2px solid transparent; width: 136px; height: 62px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; user-select: none; }
  .stand:active { transform: scale(.95); }
  .stand[data-e="FIRMADO"]   { background: var(--firmado);   color: var(--firmado-t); box-shadow: 0 1px 4px rgba(0,0,0,.15); }
  .stand[data-e="PENDIENTE"] { background: var(--pendiente); color: var(--pend-t);    box-shadow: 0 1px 4px rgba(0,0,0,.15); }
  .stand.dimmed      { opacity: .18; pointer-events: none; }
  .stand.highlighted { box-shadow: 0 0 0 3px #1e293b; transform: scale(1.06); z-index: 5; }
  .stand .snum { font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: -.5px; }
  .stand .snombre { font-size: 11px; font-weight: 500; line-height: 1.2; margin-top: 3px; max-width: 100%; overflow: hidden; opacity: .85; }
  .empty { min-width: 136px; min-height: 62px; background: transparent; }

  .legend { padding: 12px 14px 20px; display: flex; flex-wrap: wrap; gap: 8px; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569; font-weight: 500; }
  .leg-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 18px 18px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 480px; animation: slideUp .25s ease; position: relative; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 38px; height: 4px; background: #e2e8f0; border-radius: 2px; margin: 0 auto 16px; }
  .modal-close { position: absolute; top: 18px; right: 18px; background: #f1f5f9; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #64748b; font-family: var(--font); }

  .modal-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
  .modal-badge[data-e="FIRMADO"]   { background: var(--firmado);   color: var(--firmado-t); }
  .modal-badge[data-e="PENDIENTE"] { background: var(--pendiente); color: var(--pend-t); }

  .modal h2       { font-size: 28px; font-weight: 700; }
  .modal-nombre   { font-size: 16px; font-weight: 700; color: #1e293b; margin-top: 8px; }
  .modal-rubro    { font-size: 14px; color: #475569; margin-top: 4px; font-weight: 500; }

  /* Fecha y link cuando está firmado */
  .modal-firmado-info { margin-top: 14px; padding: 12px 14px; background: #f0fdf4; border-radius: 10px; border: 1.5px solid #bbf7d0; }
  .modal-firmado-info .fi-label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  .modal-firmado-info .fi-fecha { font-size: 15px; font-weight: 700; color: #15803d; margin-top: 2px; }
  .modal-firmado-info .fi-link  { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 13px; font-weight: 600; color: #1d4ed8; text-decoration: none; }
  .modal-firmado-info .fi-link:active { opacity: .7; }

  /* Área de carga de documento */
  .upload-area {
    margin-top: 18px; border: 2px dashed #e2e8f0; border-radius: 12px;
    padding: 20px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .upload-area:hover { border-color: #94a3b8; background: #f8fafc; }
  .upload-area.has-file { border-color: var(--firmado); background: #f0fdf4; }
  .upload-area .ua-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-area .ua-text { font-size: 14px; color: #64748b; font-weight: 500; }
  .upload-area .ua-filename { font-size: 13px; color: #15803d; font-weight: 700; margin-top: 4px; }
  #fileInput { display: none; }

  .btn-firmar {
    margin-top: 14px; width: 100%; padding: 14px;
    border-radius: 12px; border: none;
    font-size: 15px; font-weight: 700; font-family: var(--font);
    cursor: pointer; background: var(--firmado); color: var(--firmado-t);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all .2s;
  }
  .btn-firmar:disabled { opacity: .5; cursor: not-allowed; }
  .btn-firmar:active { transform: scale(.97); }

  .btn-spinner { width: 18px; height: 18px; border: 3px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
  .btn-firmar.loading .btn-spinner { display: inline-block; }
  .btn-firmar.loading .btn-text    { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .modal-toast { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; text-align: center; display: none; }
  .modal-toast.ok  { background: #f0fdf4; color: #15803d; display: block; }
  .modal-toast.err { background: #fee2e2; color: #b91c1c; display: block; }
</style>
</head>

<script>
document.addEventListener('touchstart', e => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});
document.addEventListener('touchmove',  e => { if(e.touches.length>1) e.preventDefault(); }, {passive:false});
let lastTap = 0;
document.addEventListener('touchend', e => { const now=Date.now(); if(now-lastTap<300) e.preventDefault(); lastTap=now; }, {passive:false});

// 👇 Reemplazá con la URL de tu Apps Script de contratos
const API_URL = "https://script.google.com/macros/s/AKfycbx4tzK--1yvxGHfjU98QC4Mfubq77O5bLWlTJ7QW_nxAiU0zO6WodCe1N09gHeotOYR9Q/exec";

let FULL_DATA     = {};
let currentFloor  = 'pb';
let currentFilter = 'todos';
let modalStandId  = null;
let archivoBase64 = null;
let archivoNombre = null;
let archivoTipo   = null;

// ── LOAD ─────────────────────────────────────────────────────────────────────
async function load() {
  try {
    FULL_DATA = await callScript({});
    buildGrid('grid-pb', FULL_DATA.pbData);
    buildGrid('grid-pa', FULL_DATA.paData);
    buildStats();
    const total = Object.keys(FULL_DATA.pbData).length + Object.keys(FULL_DATA.paData).length;
    document.getElementById('subtitle').textContent = `${total} stands · Planta Baja y Planta Alta`;
    aplicarZoom();
  } catch(e) {
    document.getElementById('subtitle').textContent = 'Error al cargar datos';
  }
}

// ── BUILD GRID ───────────────────────────────────────────────────────────────
function buildGrid(gridId, data) {
  const el      = document.getElementById(gridId);
  const rows    = Object.values(data).map(s => s.r);
  const colsArr = Object.values(data).map(s => s.c);
  const minR = Math.min(...rows), maxR = Math.max(...rows);
  const minC = Math.min(...colsArr), maxC = Math.max(...colsArr);
  el.style.gridTemplateColumns = `repeat(${maxC - minC + 1}, 68px)`;

  const idx = {};
  Object.entries(data).forEach(([num, s]) => { idx[`${s.r},${s.c}`] = { num, ...s }; });

  let html = '';
  for (let r = minR; r <= maxR; r++) {
    for (let c = minC; c <= maxC; c++) {
      const s = idx[`${r},${c}`];
      if (s) {
        const nombreTrunc = s.n ? (s.n.length > 18 ? s.n.slice(0,16) + '…' : s.n) : '';
        html += `<div class="stand"
          data-num="${s.num}"
          data-e="${s.estado}"
          data-n="${(s.n||'').replace(/"/g,'&quot;')}"
          data-rb="${(s.rb||'').replace(/"/g,'&quot;')}"
          onclick="openModal('${s.num}')">
          <span class="snum">${s.num}</span>
          ${nombreTrunc ? `<span class="snombre">${nombreTrunc}</span>` : ''}
        </div>`;
      } else {
        html += `<div class="empty"></div>`;
      }
    }
  }
  el.innerHTML = html;
}

// ── STATS ────────────────────────────────────────────────────────────────────
function buildStats() {
  const all = [...Object.values(FULL_DATA.pbData||{}), ...Object.values(FULL_DATA.paData||{})];
  const firmados   = all.filter(s => s.estado === 'FIRMADO').length;
  const pendientes = all.filter(s => s.estado === 'PENDIENTE').length;
  const pct = all.length > 0 ? Math.round(firmados / all.length * 100) : 0;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill"><div class="dot" style="background:#64748b"></div>Total <strong>${all.length}</strong></div>
    <div class="stat-pill"><div class="dot" style="background:var(--firmado)"></div>Firmado <strong>${firmados}</strong></div>
    <div class="stat-pill"><div class="dot" style="background:var(--pendiente)"></div>Pendiente <strong>${pendientes}</strong></div>
    <div class="stat-pill"><div class="dot" style="background:#64748b"></div>Avance <strong>${pct}%</strong></div>
  `;
}

// ── SWITCH FLOOR ─────────────────────────────────────────────────────────────
function switchFloor(f, btn) {
  currentFloor = f;
  document.querySelectorAll('.floor').forEach(el => el.classList.remove('active'));
  document.getElementById(`floor-${f}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
  setTimeout(() => { aplicarZoom(); }, 50);
}

// ── FILTROS ───────────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const q      = document.getElementById('searchInput').value.toLowerCase().trim();
  const gridId = currentFloor === 'pb' ? 'grid-pb' : 'grid-pa';
  document.querySelectorAll(`#${gridId} .stand`).forEach(el => {
    const matchF = currentFilter === 'todos' || el.dataset.e === currentFilter;
    const matchS = !q || el.dataset.num.includes(q) || (el.dataset.n||'').toLowerCase().includes(q);
    if (matchF && matchS) {
      el.classList.remove('dimmed');
      if (q) el.classList.add('highlighted'); else el.classList.remove('highlighted');
    } else {
      el.classList.add('dimmed'); el.classList.remove('highlighted');
    }
  });
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
  modalStandId  = id;
  archivoBase64 = null;
  archivoNombre = null;
  archivoTipo   = null;

  const data   = (FULL_DATA.pbData||{})[id] || (FULL_DATA.paData||{})[id] || {};
  const estado = data.estado || 'PENDIENTE';

  const badge = document.getElementById('modalBadge');
  badge.setAttribute('data-e', estado);
  badge.textContent = estado === 'FIRMADO' ? '✅ Firmado' : '⏳ Pendiente';

  document.getElementById('modalNum').textContent    = `Stand ${id}`;
  document.getElementById('modalNombre').textContent = data.n  || '';
  document.getElementById('modalRubro').textContent  = data.rb || '';
  document.getElementById('modalToast').className    = 'modal-toast';

  // Reset upload area
  const uploadArea = document.getElementById('uploadArea');
  uploadArea.className = 'upload-area';
  document.getElementById('uploadFilename').style.display = 'none';
  document.getElementById('uploadFilename').textContent   = '';
  document.getElementById('btnFirmar').disabled = true;
  document.getElementById('fileInput').value = '';

  if (estado === 'FIRMADO') {
    document.getElementById('modalFirmadoInfo').style.display = 'block';
    document.getElementById('modalUpload').style.display      = 'none';
    document.getElementById('modalFecha').textContent         = data.fecha || '';
    const linkEl = document.getElementById('modalLink');
    if (data.link) {
      linkEl.href = data.link;
      linkEl.style.display = 'inline-flex';
    } else {
      linkEl.style.display = 'none';
    }
  } else {
    document.getElementById('modalFirmadoInfo').style.display = 'none';
    document.getElementById('modalUpload').style.display      = 'block';
  }

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.currentTarget.tagName === 'BUTTON') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

// ── ARCHIVO SELECCIONADO ──────────────────────────────────────────────────────
function archivoSeleccionado(input) {
  const file = input.files[0];
  if (!file) return;

  archivoNombre = file.name;
  archivoTipo   = file.type;

  const reader = new FileReader();
  reader.onload = function(e) {
    // Extraer solo el base64 sin el prefijo "data:...;base64,"
    archivoBase64 = e.target.result.split(',')[1];

    const uploadArea = document.getElementById('uploadArea');
    uploadArea.className = 'upload-area has-file';
    const fnEl = document.getElementById('uploadFilename');
    fnEl.textContent   = file.name;
    fnEl.style.display = 'block';
    document.getElementById('btnFirmar').disabled = false;
  };
  reader.readAsDataURL(file);
}

// ── FIRMAR CONTRATO ───────────────────────────────────────────────────────────
async function firmarContrato() {
  if (!archivoBase64) return;

  const btn   = document.getElementById('btnFirmar');
  const toast = document.getElementById('modalToast');
  btn.classList.add('loading');
  btn.disabled  = true;
  toast.className = 'modal-toast';

  try {
    // Enviar base64 en chunks para evitar 413 (URL demasiado larga)
    const CHUNK_SIZE = 3000; // 3000 chars base64url → URL ~3000 chars → no hay redirect de Google
    const totalChunks = Math.ceil(archivoBase64.length / CHUNK_SIZE);
    const uploadId = Date.now() + '_' + modalStandId;
    const sep = API_URL.includes('?') ? '&' : '?';

    // Subir chunks
    for (let i = 0; i < totalChunks; i++) {
      const chunk = archivoBase64.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE);
      // Convertir base64 a base64url: no necesita %XX, no expande la URL
      const chunkSafe = chunk.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      const url = API_URL + sep + 'accion=chunk'
        + '&uploadId='    + encodeURIComponent(uploadId)
        + '&chunkIndex='  + i
        + '&totalChunks=' + totalChunks
        + '&fileData='    + chunkSafe;
      const r = await fetch(url);
      const d = await r.json();
      if (!d.ok) throw new Error('Error en chunk ' + i + ': ' + (d.error || ''));
      toast.textContent = `⏳ Subiendo... ${Math.round((i+1)/totalChunks*100)}%`;
      toast.className   = 'modal-toast';
      await new Promise(res => setTimeout(res, 10)); // fuerza repintado
    }

    // Confirmar el archivo completo
    const url = API_URL + sep + 'accion=firmar'
      + '&uploadId='  + encodeURIComponent(uploadId)
      + '&standId='   + encodeURIComponent(modalStandId)
      + '&fileName='  + encodeURIComponent(archivoNombre)
      + '&fileType='  + encodeURIComponent(archivoTipo);
    const res  = await fetch(url);
    const data = await res.json();

    if (data.ok) {
      // Actualizar datos locales
      const floorData = (FULL_DATA.pbData||{})[modalStandId]
        ? FULL_DATA.pbData : FULL_DATA.paData;
      if (floorData[modalStandId]) {
        floorData[modalStandId].estado = 'FIRMADO';
        floorData[modalStandId].link   = data.link;
      }

      // Actualizar celda en el grid
      const cell = document.querySelector(`.stand[data-num="${modalStandId}"]`);
      if (cell) cell.setAttribute('data-e', 'FIRMADO');

      buildStats();

      toast.textContent = '✔ Contrato registrado correctamente';
      toast.className   = 'modal-toast ok';

      // Cerrar modal después de 2 segundos
      setTimeout(() => { closeModal(); }, 2000);

    } else {
      throw new Error(data.error || 'Error desconocido');
    }
  } catch(err) {
    toast.textContent = '✖ Error: ' + err.message;
    toast.className   = 'modal-toast err';
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── ZOOM ─────────────────────────────────────────────────────────────────────
const ZOOM_STEPS = [0.4, 0.5, 0.6, 0.75, 0.9, 1.1, 1.3];
let zoomIdx = 2;
function aplicarZoom() {
  const scale = ZOOM_STEPS[zoomIdx];
  document.querySelectorAll('.map-inner').forEach(inner => { inner.style.transform = `scale(${scale})`; });
  document.getElementById('zoomLabel').textContent = Math.round(scale * 100) + '%';
  fixMapSize(); centerMap();
}
function cambiarZoom(dir) { zoomIdx = Math.max(0, Math.min(ZOOM_STEPS.length-1, zoomIdx+dir)); aplicarZoom(); }
function fixMapSize() {
  const scale = ZOOM_STEPS[zoomIdx];
  document.querySelectorAll('.map-inner').forEach(inner => {
    const bg = inner.querySelector('.map-bg');
    const w  = Math.max(inner.scrollWidth,  bg ? parseInt(bg.getAttribute('width'))  : 0);
    const h  = Math.max(inner.scrollHeight, bg ? parseInt(bg.getAttribute('height')) : 0);
    inner.style.width = (w*scale)+'px'; inner.style.height = (h*scale)+'px';
  });
}
function centerMap() {
  const scale = ZOOM_STEPS[zoomIdx];
  document.querySelectorAll('.map-scroll').forEach(container => {
    const inner = container.querySelector('.map-inner'); if (!inner) return;
    const cw = inner.scrollWidth * scale;
    inner.style.marginLeft = cw < container.clientWidth ? (container.clientWidth-cw)/2+'px' : '0px';
  });
}

// ── callScript: mismo patrón que el script de feria que funciona ─────────────
async function callScript(params) {
  const sep = API_URL.includes('?') ? '&' : '?';
  const qs  = new URLSearchParams(params);
  const res = await fetch(API_URL + sep + qs.toString());
  return res.json();
}
